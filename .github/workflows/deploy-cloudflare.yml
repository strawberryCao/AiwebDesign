name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write
  issues: write

jobs:
  deploy:
    name: Build, deploy, verify, and record
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: cloudflare-production
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "::error::Missing repository secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::error::Missing repository secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Static check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Deploy exact commit to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.63.0"
          command: deploy

      - name: Validate deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          if [[ -z "$DEPLOYMENT_URL" ]]; then
            echo "::error::Cloudflare deployment produced no deployment-url output"
            exit 1
          fi
          echo "Deployment URL: $DEPLOYMENT_URL"

      - name: Smoke-test deployed site
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --retry 8 --retry-delay 5 --retry-all-errors \
            --max-time 30 \
            "$DEPLOYMENT_URL" > /dev/null

      - name: Publish immutable deployment receipt
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          node <<'NODE'
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const branch = 'deployment-records';
          const sourceSha = process.env.GITHUB_SHA;
          const apiBase = `https://api.github.com/repos/${owner}/${repo}`;
          const headers = {
            Accept: 'application/vnd.github+json',
            Authorization: `Bearer ${process.env.GH_TOKEN}`,
            'X-GitHub-Api-Version': '2022-11-28',
            'Content-Type': 'application/json',
          };

          async function request(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: { ...headers, ...(options.headers ?? {}) },
            });
            const text = await response.text();
            const data = text ? JSON.parse(text) : null;
            if (!response.ok) {
              const error = new Error(`GitHub API ${response.status}: ${text}`);
              error.status = response.status;
              throw error;
            }
            return data;
          }

          try {
            await request(`${apiBase}/git/ref/heads/${branch}`);
          } catch (error) {
            if (error.status !== 404) throw error;
            try {
              await request(`${apiBase}/git/refs`, {
                method: 'POST',
                body: JSON.stringify({ ref: `refs/heads/${branch}`, sha: sourceSha }),
              });
            } catch (createError) {
              if (createError.status !== 422) throw createError;
            }
          }

          const receipt = {
            schema_version: 1,
            source_sha: sourceSha,
            source_ref: process.env.GITHUB_REF,
            workflow_run_id: process.env.GITHUB_RUN_ID,
            workflow_run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT),
            deployed_at: new Date().toISOString(),
            deployment_url: process.env.DEPLOYMENT_URL,
            build: {
              install: 'npm install --no-audit --no-fund',
              check: 'npm run check',
              command: 'npm run build',
              deploy: 'cloudflare/wrangler-action@v3 command=deploy',
              smoke_test: 'passed',
            },
          };

          async function upsert(path) {
            let currentSha;
            try {
              const current = await request(`${apiBase}/contents/${path}?ref=${encodeURIComponent(branch)}`);
              currentSha = current.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const body = {
              message: `deploy: record ${sourceSha.slice(0, 12)}`,
              content: Buffer.from(`${JSON.stringify(receipt, null, 2)}\n`).toString('base64'),
              branch,
            };
            if (currentSha) body.sha = currentSha;

            await request(`${apiBase}/contents/${path}`, {
              method: 'PUT',
              body: JSON.stringify(body),
            });
          }

          await upsert(`AUTONOMY/deployments/${sourceSha}.json`);
          await upsert('AUTONOMY/deployments/latest.json');
          console.log(`Published deployment receipt for ${sourceSha}.`);
          NODE

      - name: Report workflow result to issue 1
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          node <<'NODE'
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const status = process.env.JOB_STATUS;
          const url = process.env.DEPLOYMENT_URL || '(not produced)';
          const sha = process.env.GITHUB_SHA;
          const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const body = [
            `### [DEPLOYMENT] ${status.toUpperCase()}`,
            `- SHA: \`${sha}\``,
            `- URL: ${url}`,
            `- Workflow run: ${runUrl}`,
            `- Event: \`${process.env.GITHUB_EVENT_NAME}\``,
          ].join('\n');

          const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/1/comments`, {
            method: 'POST',
            headers: {
              Accept: 'application/vnd.github+json',
              Authorization: `Bearer ${process.env.GH_TOKEN}`,
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ body }),
          });
          if (!response.ok) {
            throw new Error(`Failed to report workflow result: ${response.status} ${await response.text()}`);
          }
          NODE
