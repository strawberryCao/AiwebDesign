name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write
  issues: write

jobs:
  deploy:
    name: Build, deploy, browser-audit, and record
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: cloudflare-production
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "::error::Missing repository secret CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::error::Missing repository secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Static check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Deploy exact commit to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.63.0"
          command: deploy

      - name: Validate deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          if [[ -z "$DEPLOYMENT_URL" ]]; then
            echo "::error::Cloudflare deployment produced no deployment-url output"
            exit 1
          fi
          echo "Deployment URL: $DEPLOYMENT_URL"

      - name: Smoke-test deployed site
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --retry 8 --retry-delay 5 --retry-all-errors \
            --max-time 30 \
            "$DEPLOYMENT_URL" > /dev/null

      - name: Publish immutable deployment receipt
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        shell: bash
        run: |
          node <<'NODE'
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const branch = 'deployment-records';
          const sourceSha = process.env.GITHUB_SHA;
          const apiBase = `https://api.github.com/repos/${owner}/${repo}`;
          const headers = {
            Accept: 'application/vnd.github+json',
            Authorization: `Bearer ${process.env.GH_TOKEN}`,
            'X-GitHub-Api-Version': '2022-11-28',
            'Content-Type': 'application/json',
          };

          async function request(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: { ...headers, ...(options.headers ?? {}) },
            });
            const text = await response.text();
            const data = text ? JSON.parse(text) : null;
            if (!response.ok) {
              const error = new Error(`GitHub API ${response.status}: ${text}`);
              error.status = response.status;
              throw error;
            }
            return data;
          }

          try {
            await request(`${apiBase}/git/ref/heads/${branch}`);
          } catch (error) {
            if (error.status !== 404) throw error;
            try {
              await request(`${apiBase}/git/refs`, {
                method: 'POST',
                body: JSON.stringify({ ref: `refs/heads/${branch}`, sha: sourceSha }),
              });
            } catch (createError) {
              if (createError.status !== 422) throw createError;
            }
          }

          const receipt = {
            schema_version: 1,
            source_sha: sourceSha,
            source_ref: process.env.GITHUB_REF,
            workflow_run_id: process.env.GITHUB_RUN_ID,
            workflow_run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT),
            deployed_at: new Date().toISOString(),
            deployment_url: process.env.DEPLOYMENT_URL,
            build: {
              install: 'npm install --no-audit --no-fund',
              check: 'npm run check',
              command: 'npm run build',
              deploy: 'cloudflare/wrangler-action@v3 command=deploy',
              smoke_test: 'passed',
            },
          };

          async function upsert(path, value) {
            let currentSha;
            try {
              const current = await request(`${apiBase}/contents/${path}?ref=${encodeURIComponent(branch)}`);
              currentSha = current.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const body = {
              message: `deploy: record ${sourceSha.slice(0, 12)}`,
              content: Buffer.from(`${JSON.stringify(value, null, 2)}\n`).toString('base64'),
              branch,
            };
            if (currentSha) body.sha = currentSha;

            await request(`${apiBase}/contents/${path}`, {
              method: 'PUT',
              body: JSON.stringify(body),
            });
          }

          await upsert(`AUTONOMY/deployments/${sourceSha}.json`, receipt);
          await upsert('AUTONOMY/deployments/latest.json', receipt);
          console.log(`Published deployment receipt for ${sourceSha}.`);
          NODE

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run exact-SHA deployed browser audit
        id: browser_audit
        continue-on-error: true
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          SOURCE_SHA: ${{ github.sha }}
        run: npm run audit:browser

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish immutable browser-audit receipt
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          AUDIT_STEP_OUTCOME: ${{ steps.browser_audit.outcome }}
          AUDIT_ARTIFACT_NAME: browser-audit-${{ github.sha }}
        shell: bash
        run: |
          node <<'NODE'
          import fs from 'node:fs';

          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const branch = 'deployment-records';
          const sourceSha = process.env.GITHUB_SHA;
          const apiBase = `https://api.github.com/repos/${owner}/${repo}`;
          const auditPath = 'test-results/browser-audit/audit.json';
          const headers = {
            Accept: 'application/vnd.github+json',
            Authorization: `Bearer ${process.env.GH_TOKEN}`,
            'X-GitHub-Api-Version': '2022-11-28',
            'Content-Type': 'application/json',
          };

          async function request(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: { ...headers, ...(options.headers ?? {}) },
            });
            const text = await response.text();
            const data = text ? JSON.parse(text) : null;
            if (!response.ok) {
              const error = new Error(`GitHub API ${response.status}: ${text}`);
              error.status = response.status;
              throw error;
            }
            return data;
          }

          let audit;
          if (fs.existsSync(auditPath)) {
            audit = JSON.parse(fs.readFileSync(auditPath, 'utf8'));
          } else {
            audit = {
              schema_version: 1,
              source_sha: sourceSha,
              deployment_url: process.env.DEPLOYMENT_URL || null,
              verified_at: new Date().toISOString(),
              completed_at: new Date().toISOString(),
              result: 'failed',
              fatal_error: {
                name: 'MissingAuditOutput',
                message: `Browser audit step outcome was ${process.env.AUDIT_STEP_OUTCOME}; ${auditPath} was not produced.`,
              },
              scenarios: {},
              webgl_recovery: null,
              artifacts: {},
            };
          }

          audit.source_sha = sourceSha;
          audit.deployment_url = process.env.DEPLOYMENT_URL || audit.deployment_url || null;
          audit.workflow_run_id = process.env.GITHUB_RUN_ID;
          audit.workflow_run_attempt = Number(process.env.GITHUB_RUN_ATTEMPT);
          audit.workflow_step_outcome = process.env.AUDIT_STEP_OUTCOME;
          audit.artifact_name = process.env.AUDIT_ARTIFACT_NAME;
          audit.workflow_run_url = `https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

          async function upsert(path, value) {
            let currentSha;
            try {
              const current = await request(`${apiBase}/contents/${path}?ref=${encodeURIComponent(branch)}`);
              currentSha = current.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const body = {
              message: `audit: record browser evidence ${sourceSha.slice(0, 12)}`,
              content: Buffer.from(`${JSON.stringify(value, null, 2)}\n`).toString('base64'),
              branch,
            };
            if (currentSha) body.sha = currentSha;

            await request(`${apiBase}/contents/${path}`, {
              method: 'PUT',
              body: JSON.stringify(body),
            });
          }

          await upsert(`AUTONOMY/browser-audits/${sourceSha}.json`, audit);
          await upsert('AUTONOMY/browser-audits/latest.json', audit);
          console.log(`Published browser-audit receipt for ${sourceSha}: ${audit.result}.`);
          NODE

      - name: Enforce browser-audit gate
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          import fs from 'node:fs';
          const path = 'test-results/browser-audit/audit.json';
          if (!fs.existsSync(path)) {
            throw new Error(`Browser audit did not produce ${path}.`);
          }
          const audit = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (audit.source_sha !== process.env.GITHUB_SHA) {
            throw new Error(`Browser audit SHA mismatch: ${audit.source_sha} != ${process.env.GITHUB_SHA}`);
          }
          if (audit.result !== 'passed') {
            throw new Error(`Browser audit result is ${audit.result}; inspect the uploaded artifact and immutable receipt.`);
          }
          console.log(`Browser audit passed for ${audit.source_sha}.`);
          NODE

      - name: Report workflow result to issue 1
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          AUDIT_OUTCOME: ${{ steps.browser_audit.outcome }}
        shell: bash
        run: |
          node <<'NODE'
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const status = process.env.JOB_STATUS;
          const url = process.env.DEPLOYMENT_URL || '(not produced)';
          const sha = process.env.GITHUB_SHA;
          const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const body = [
            `### [DEPLOYMENT + BROWSER AUDIT] ${status.toUpperCase()}`,
            `- SHA: \`${sha}\``,
            `- URL: ${url}`,
            `- Browser audit step: \`${process.env.AUDIT_OUTCOME || 'not-run'}\``,
            `- Evidence artifact: \`browser-audit-${sha}\``,
            `- Workflow run: ${runUrl}`,
            `- Event: \`${process.env.GITHUB_EVENT_NAME}\``,
          ].join('\n');

          const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/1/comments`, {
            method: 'POST',
            headers: {
              Accept: 'application/vnd.github+json',
              Authorization: `Bearer ${process.env.GH_TOKEN}`,
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ body }),
          });
          if (!response.ok) {
            throw new Error(`Failed to report workflow result: ${response.status} ${await response.text()}`);
          }
          NODE
